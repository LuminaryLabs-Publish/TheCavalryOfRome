<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="icon" href="data:," />
  <title>Cavalry of Rome</title>
  <style>
    :root {
      color-scheme: dark;
      background: #52695f;
      color: #f6ead6;
      font-family: Georgia, "Times New Roman", serif;
    }

    html,
    body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #52695f;
      user-select: none;
    }

    #app,
    #game {
      position: fixed;
      inset: 0;
    }

    #app::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      background:
        radial-gradient(circle at 42% 12%, rgba(255, 190, 112, 0.16), transparent 20%),
        radial-gradient(circle at 50% 52%, transparent 46%, rgba(24, 38, 34, 0.34) 100%),
        linear-gradient(180deg, rgba(19, 31, 37, 0.18), transparent 38%, rgba(16, 26, 21, 0.25));
      mix-blend-mode: multiply;
    }

    #game {
      display: block;
      width: 100vw;
      height: 100vh;
      cursor: grab;
      outline: none;
      touch-action: none;
    }

    #game:active {
      cursor: grabbing;
    }

    .hud {
      position: fixed;
      inset: 0;
      z-index: 5;
      pointer-events: none;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 18px;
      box-sizing: border-box;
      color: #f6ead6;
      text-shadow: 0 2px 10px rgba(0,0,0,0.55);
      font-family: Georgia, "Times New Roman", serif;
    }

    .hud__left,
    .hud__right {
      border-top: 1px solid rgba(246,234,214,0.55);
      padding-top: 10px;
      max-width: min(44vw, 430px);
    }

    .hud__right {
      text-align: right;
      color: rgba(246,234,214,0.78);
      font-size: 14px;
      letter-spacing: 0;
    }

    .hud__title {
      font-size: 22px;
      line-height: 1;
      font-weight: 700;
      letter-spacing: 0;
    }

    .hud__line {
      margin-top: 6px;
      color: rgba(246,234,214,0.78);
      font-size: 13px;
      letter-spacing: 0;
    }

    .hud__meters {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 10px;
      color: rgba(246,234,214,0.68);
      font-size: 12px;
      letter-spacing: 0;
      font-family: "Trebuchet MS", Verdana, sans-serif;
      text-transform: uppercase;
    }

    .hud__region {
      margin-top: 8px;
      color: rgba(246,234,214,0.82);
      font-size: 12px;
      font-family: "Trebuchet MS", Verdana, sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    @media (max-width: 720px) {
      .hud {
        padding: 12px;
      }

      .hud__left,
      .hud__right {
        max-width: 48vw;
      }

      .hud__title {
        font-size: 18px;
      }

      .hud__meters {
        gap: 7px;
        font-size: 10px;
      }
    }

    #errorPanel {
      position: fixed;
      left: 1rem;
      right: 1rem;
      bottom: 1rem;
      z-index: 10;
      max-height: 45vh;
      overflow: auto;
      white-space: pre-wrap;
      padding: 1rem;
      border: 1px solid rgba(255, 118, 92, 0.55);
      border-radius: 0.75rem;
      background: rgba(63, 16, 13, 0.92);
      color: #ffe2d8;
      box-shadow: 0 1rem 2.5rem rgba(0,0,0,0.4);
    }

    #errorPanel[hidden] {
      display: none;
    }
  </style>
</head>
<body>
  <main id="app" aria-label="Cavalry of Rome playable canvas game">
    <canvas id="game" role="application" aria-label="Cavalry of Rome battlefield"></canvas>
    <section id="errorPanel" role="alert" hidden></section>
  </main>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.185.1/build/three.module.js",
        "three/webgpu": "https://cdn.jsdelivr.net/npm/three@0.185.1/build/three.webgpu.js",
        "three/tsl": "https://cdn.jsdelivr.net/npm/three@0.185.1/build/three.tsl.js"
      }
    }
  </script>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
